name: MeshCore .NET CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine package version
        run: |
          BASE_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)
          if [ -z "$BASE_VERSION" ]; then
            echo "Could not determine version from Directory.Build.props" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            TAG_VERSION=${TAG_NAME#v}
            VERSION="$TAG_VERSION"
          else
            VERSION="${BASE_VERSION}.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Package version: $VERSION"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            TAG_VERSION=${TAG_NAME#v}
            if [ "$TAG_VERSION" != "$VERSION" ]; then
              echo "Tag version '$TAG_VERSION' does not match package version '$VERSION'" >&2
              exit 1
            fi
          fi

      - name: Determine release tag
        if: github.event_name != 'pull_request'
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          else
            RELEASE_TAG="v${VERSION}"
          fi
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "Release tag: $RELEASE_TAG"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore meshcore-net/meshcore-net.csproj

      - name: Run tests
        run: dotnet test meshcore-net/meshcore-net.Tests/meshcore-net.Tests.csproj --verbosity minimal

      - name: Publish Raspberry Pi build
        run: dotnet publish meshcore-net/meshcore-net.csproj -c Release -r linux-arm64 --self-contained true -o publish/linux-arm64

      - name: Package Debian package
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot
          rm -rf package
          mkdir -p package/DEBIAN package/usr/local/bin package/var/lib/meshcore package/etc/meshcore-netcore package/lib/systemd/system
          cp -r publish/linux-arm64/* package/var/lib/meshcore/
          ln -s /var/lib/meshcore/meshcore-net package/usr/local/bin/meshcore-net
          cp config.toml package/etc/meshcore-netcore/config.toml
          cp readonly.toml package/etc/meshcore-netcore/readonly.toml
          cp meshcore-netcore.service package/lib/systemd/system/meshcore-netcore.service
          cat > package/DEBIAN/control <<EOF
          Package: meshcore-netcore
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: MeshCore <meshcore@example.com>
          Description: MeshCore .NET core host and management server
           A Linux .NET host for MeshCore with companion and relay configuration support.
          EOF
          cat > package/DEBIAN/postinst <<'EOF'
          #!/bin/sh
          set -e
          if ! getent group meshcore-netcore >/dev/null 2>&1; then
            groupadd --system meshcore-netcore || true
          fi
          if ! id -u meshcore-netcore >/dev/null 2>&1; then
            useradd --system --no-create-home --home-dir /var/lib/meshcore --shell /usr/sbin/nologin -g meshcore-netcore meshcore-netcore || true
          fi
          chown -R meshcore-netcore:meshcore-netcore /var/lib/meshcore /etc/meshcore-netcore || true
          if command -v systemctl >/dev/null 2>&1; then
            systemctl daemon-reload
            systemctl enable meshcore-netcore.service
            if ! systemctl restart meshcore-netcore.service; then
              systemctl --no-pager --full status meshcore-netcore.service || true
              journalctl -u meshcore-netcore.service -n 80 --no-pager || true
              exit 1
            fi
          fi
          exit 0
          EOF

          cat > package/DEBIAN/preinst <<'EOF'
          #!/bin/sh
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl stop meshcore-netcore.service >/dev/null 2>&1 || true
          fi
          exit 0
          EOF

          cat > package/DEBIAN/prerm <<'EOF'
          #!/bin/sh
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl stop meshcore-netcore.service >/dev/null 2>&1 || true
            case "$1" in
              remove|purge|deconfigure)
                systemctl disable meshcore-netcore.service >/dev/null 2>&1 || true
                ;;
            esac
          fi
          exit 0
          EOF

          chmod 755 package/DEBIAN/postinst
          chmod 755 package/DEBIAN/preinst
          chmod 755 package/DEBIAN/prerm
          fakeroot dpkg-deb --build package "publish/linux-arm64/meshcore-netcore_${VERSION}_arm64.deb"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshcore-net-linux-arm64
          path: publish/linux-arm64
          if-no-files-found: error

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshcore-netcore-deb
          path: publish/linux-arm64/meshcore-netcore_${{ env.VERSION }}_arm64.deb
          if-no-files-found: error

      - name: Package release archive
        if: github.event_name != 'pull_request'
        run: |
          cd publish/linux-arm64
          tar -czf ../../meshcore-net-linux-arm64-${VERSION}.tar.gz .

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_TAG }}
          files: |
            meshcore-net-linux-arm64-${{ env.VERSION }}.tar.gz
            publish/linux-arm64/meshcore-netcore_${{ env.VERSION }}_arm64.deb
          generate_release_notes: true
