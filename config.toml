# Companion radio config file

# This file is in TOML format
# https://toml.io/en/

# This sample config starts in relay mode.
interfaces = ["lora"]

# A single repeater is the default device.
devices = ["repeater"]


[dispatcher]
pass_internal = true

[server.web]
port = 80

[gps]
# Enable onboard GPS ingest from NMEA serial and feed position into MeshCore identities.
enabled = false

# Position strategy:
# - "average": fixed-point average over retained history
# - "roaming": latest valid fix
mode = "average"

# Common Raspberry Pi serial GPS defaults
device = "/dev/serial0"
baud = 9600

# Keep one-year round-robin history by time and sample interval
sample_interval_seconds = 60
retention_days = 365

# Optional persisted files
# history_file = "/var/lib/meshcore/gps-history.csv"
# state_file = "/var/lib/meshcore/gps-state.json"

# Interfaces

[interface.lora]
type = "lora"

# Common Pi SX126x defaults. Adjust to match your radio board.
chip = "sx126x"

# UK/EU default mesh channel.
frequency = 869618000
sf = 8
bw = 62500
cr = 8
txpower = 22

[device.repeater]
type = "repeater"
name = "Mesh Relay"

# Relay defaults
guest.open = true
readonly = false

# Waveshare LoRa HAT
[interface.waveshare]

# What kind of interface is this?
type="lora"

# UK/EU default
frequency=869618000
sf=8
bw=62500
cr=8
txpower=22

# Use DIO2 as RF switch
dio2.rfswitch = true

# HT-RA62 module wired to a Raspberry Pi
[interface.htra62]

type="lora"

# UK/EU default
frequency=869618000
sf=8
bw=62500
cr=8
txpower=22

# Use DIO3 to control TXCO
# Valid voltages are: 1.6, 1.7, 1.8, 2.2, 2.4, 2.7, 3.0, 3.3
dio3.voltage = 1.8
# Valid delay values are 2.5, 5, 10
dio3.tcxo_delay = 10


[interface.espnow]
# Interface name
device = "mon0"

[interface.mock]
# Optional file to read from; if not specified, the mock interface is just
# a null source/sink
#file="mock.txt"

[interface.companion]
# Default connection is /dev/ttyUSB0
# port = "/dev/ttyUSB0"


[device.companion]
# What kind of device is this? Defaults to the device name
# type = "companion"

# Default name is "Companion ########" (8 bytes of public key)
# name = "New companion radio"

# The companion radio identity key is loaded from /etc/meshcore-netcore/private.
# That file is created during install and reused on startup.

# Default is no latitude/longitude
# lat = 0
# lon = 0

# Contacts file
contacts = "contacts.mesh"

# Maximum channels
# channels = 32
channelfile = "channels.json"

# Make sure the Public channel is there
add_public_channel = true

interface = "wifi"
# wifi.port = 5000
# wifi.listen = all interfaces

# interface = "serial"
# serial.port = "/dev/tnt0"

