# MeshCore .NET config for Raspberry Pi 5 + Dragino LoRa HAT v1.4
# Copy to /etc/meshcore-netcore/config.toml on the target Pi.

interfaces = ["dragino"]
devices = ["repeater1"]

[dispatcher]
pass_internal = false

# Web management
[server.web]
port = 80

# Simple admin login seed (change before production use)
[server]
admin.password = "change-this-now"
guest.open = true

# Dragino LoRa HAT v1.4 (SX1276/SX1278 family)
[interface.dragino]
type = "dragino-hat"
region = "868"
chip = "sx127x"

# Raspberry Pi 5 SPI/GPIO mapping for Dragino LoRa HAT v1.4
spi = 0
cs = 0
nss = 25
reset = 17
busy = -1
irq = 4
txen = -1
rxen = -1
wake = -1

# Radio defaults (EU868)
frequency = 869618000
sf = 8
bw = 62500
cr = 8
txpower = 22
airtime = 10

# Dragino HAT v1.4 does not use SX126x DIO2 RF switch control.
dio2.rfswitch = false

[device.repeater1]
type = "repeater"
name = "Pi5 Dragino Repeater"

# Optional fixed identity (otherwise generated at first run)
# privatekey = "<64-or-128-hex-chars>"

# Optional location
# lat = 51.5
# lon = -0.12
