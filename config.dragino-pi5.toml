# MeshCore .NET config for Raspberry Pi 5 + Dragino LoRa HAT v1.4
# Copy to /etc/meshcore-netcore/config.toml on the target Pi.

interfaces = ["dragino"]
devices = ["repeater1"]

[dispatcher]
pass_internal = false

# Web management
[server.web]
port = 80

# Simple admin login seed (change before production use)
[server]
admin.password = "change-this-now"
guest.open = true

# Dragino LoRa HAT v1.4 (SX1276/SX1278 family)
[interface.dragino]
type = "dragino-hat"
region = "868"
chip = "sx127x"

# Raspberry Pi 5 SPI/GPIO mapping for Dragino LoRa HAT v1.4
#
# The Dragino HAT v1.4 does NOT use the standard SPI chip selects CE0/CE1.
# It uses GPIO 25 as its NSS/CS pin.  On a Pi 5 (Raspberry Pi OS Bookworm)
# you must expose this as /dev/spidev0.2 via a device-tree overlay BEFORE
# the stack will communicate with the radio.
#
# Add the following line to /boot/firmware/config.txt and reboot:
#
#   dtoverlay=spi0-3cs,cs2_pin=25
#
# Verify the device node appears:
#   ls /dev/spidev*   # should include /dev/spidev0.2
#
# cs = 2  tells the driver to open /dev/spidev0.2 (GPIO 25 hardware CS).
# nss = -1 means the kernel handles chip-select via the overlay;
#          no redundant software GPIO toggle is required.
spi = 0
cs = 2
nss = -1
reset = 17
busy = -1
irq = 4
txen = -1
rxen = -1
wake = -1

# Radio defaults (EU868)
frequency = 869618000
sf = 8
bw = 62500
cr = 8
txpower = 22
airtime = 10

# Dragino HAT v1.4 does not use SX126x DIO2 RF switch control.
dio2.rfswitch = false

# GPS (Dragino HAT v1.4 onboard GPS module)
#
# The GPS is connected to the Pi UART.  Before enabling GPS you must
# disable the serial console and enable the serial hardware port:
#
#   sudo raspi-config
#   Interface Options -> Serial Port
#     Login shell over serial?  No
#     Enable serial hardware?   Yes
#
# Then set enabled = true below.
[gps]
enabled = false
mode = "average"
device = "/dev/serial0"
baud = 9600
sample_interval_seconds = 60
retention_days = 365
# history_file = "/var/lib/meshcore/gps-history.csv"
# state_file   = "/var/lib/meshcore/gps-state.json"

[device.repeater1]
type = "repeater"
name = "Pi5 Dragino Repeater"

# Optional fixed identity (otherwise generated at first run)
# privatekey = "<64-or-128-hex-chars>"

# Optional location (overrides GPS if set)
# lat = 51.5
# lon = -0.12
